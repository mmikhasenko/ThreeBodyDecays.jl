name: Test

on:
    push:
        branches:
            - main
        tags: ["*"]
    workflow_dispatch:

jobs:
    test:
        uses: ./.github/workflows/ReusableTest.yml
        with:
            os: ${{ matrix.os }}
            version: ${{ matrix.version }}
            # macOS-latest is arm64; x64 is for ubuntu/windows only
            arch: ${{ matrix.os == 'macOS-latest' && 'aarch64' || 'x64' }}
            allow_failure: ${{ matrix.allow_failure }}
            run_codecov: ${{ matrix.version == '1' && matrix.os == 'ubuntu-latest' }}
        secrets:
            codecov_token: ${{ secrets.CODECOV_TOKEN }}
        strategy:
            fail-fast: false
            matrix:
                version:
                    # 1.8+ required for native Julia binaries on macOS aarch64 (macos-latest)
                    - "1.9"
                    - "1"
                os:
                    - ubuntu-latest
                    - macOS-latest
                    - windows-latest
                allow_failure: [false]
